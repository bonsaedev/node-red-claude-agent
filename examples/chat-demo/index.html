<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Agent · Node-RED chat demo</title>
    <style>
      :root {
        --bg: #1e1e22;
        --panel: #27272d;
        --accent: #d97757;
        --user: #2f6feb;
        --text: #ececf1;
        --muted: #9a9aa5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.5 -apple-system, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 12px 16px;
        background: var(--panel);
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #000;
      }
      header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
      header .dot.on { background: #3fb950; }
      header .spacer { flex: 1; }
      header .who { color: var(--accent); font-weight: 600; }
      header input {
        background: var(--bg); border: 1px solid #3a3a42;
        color: var(--text); padding: 6px 10px; border-radius: 6px; width: 260px;
      }
      header button {
        background: #34343c; color: var(--text); border: 1px solid #45454f;
        padding: 6px 14px; border-radius: 6px; cursor: pointer;
      }

      /* login */
      .login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
      .login {
        background: var(--panel); border: 1px solid #000; border-radius: 12px;
        padding: 28px; width: 320px; display: flex; flex-direction: column; gap: 12px;
      }
      .login h2 { margin: 0 0 4px; }
      .login input {
        background: var(--bg); border: 1px solid #3a3a42; color: var(--text);
        padding: 10px; border-radius: 8px;
      }
      .login button {
        background: var(--accent); color: #fff; border: 0; padding: 10px;
        border-radius: 8px; cursor: pointer; font-weight: 600;
      }
      .login .err { color: #f08a8a; font-size: 13px; min-height: 18px; }
      .login .hint { color: var(--muted); font-size: 12px; }

      /* chat */
      #log { flex: 1; overflow-y: auto; padding: 18px; }
      .msg { max-width: 720px; margin: 0 auto 14px; display: flex; gap: 10px; }
      .msg .who { font-size: 12px; color: var(--muted); width: 64px; flex-shrink: 0; text-align: right; padding-top: 2px; }
      .msg .body { white-space: pre-wrap; flex: 1; }
      .msg.user .body { color: #cfe0ff; }
      .msg.error .body { color: #f08a8a; white-space: pre-wrap; }
      .ask {
        max-width: 720px; margin: 0 auto 14px; background: var(--panel);
        border: 1px solid var(--accent); border-radius: 10px; padding: 14px;
      }
      .ask h4 { margin: 0 0 8px; color: var(--accent); }
      .ask pre { background: var(--bg); padding: 8px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
      .ask .opts { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      .ask button {
        background: #34343c; color: var(--text); border: 1px solid #45454f;
        padding: 6px 12px; border-radius: 6px; cursor: pointer;
      }
      .ask button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      .ask button.deny { background: #5a2a2a; border-color: #7a3a3a; }
      footer { padding: 14px; background: var(--panel); border-top: 1px solid #000; }
      footer .row { max-width: 720px; margin: 0 auto; display: flex; gap: 10px; }
      footer textarea {
        flex: 1; resize: none; height: 46px; background: var(--bg);
        border: 1px solid #3a3a42; color: var(--text); border-radius: 8px; padding: 10px;
      }
      footer button {
        background: var(--accent); color: #fff; border: 0; padding: 0 22px;
        border-radius: 8px; cursor: pointer; font-weight: 600;
      }
      footer button:disabled { opacity: 0.5; cursor: default; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <span class="dot" :class="{ on: connected }"></span>
        <strong>Claude Agent</strong>
        <span class="spacer"></span>
        <template v-if="phase === 'chat'">
          <span class="who">{{ me }}</span>
          <button @click="logout">Log out</button>
        </template>
        <template v-else>
          <input v-model="url" @keyup.enter="connect" />
          <button @click="connect">{{ connected ? 'Reconnect' : 'Connect' }}</button>
        </template>
      </header>

      <!-- LOGIN -->
      <div v-if="phase === 'login'" class="login-wrap">
        <form class="login" @submit.prevent="login">
          <h2>Sign in</h2>
          <input v-model="username" placeholder="username" autocomplete="username" />
          <input v-model="password" type="password" placeholder="password" autocomplete="current-password" />
          <div class="err">{{ loginError }}</div>
          <button type="submit" :disabled="!connected">Log in</button>
          <div class="hint">demo users: alice / alice123 &nbsp;·&nbsp; bob / bob123</div>
        </form>
      </div>

      <!-- CHAT -->
      <template v-else>
        <div id="log" ref="logEl">
          <div v-for="(m, i) in messages" :key="i" class="msg" :class="m.role">
            <div class="who">{{ m.role }}</div>
            <div class="body">{{ m.text }}<span v-if="m.streaming">▍</span></div>
          </div>

          <div v-for="ask in asks" :key="ask.requestId" class="ask">
            <h4 v-if="ask.kind === 'permission'">Permission · {{ ask.toolName }}</h4>
            <h4 v-else>Claude is asking</h4>

            <template v-if="ask.kind === 'permission'">
              <pre>{{ pretty(ask.input) }}</pre>
              <div class="opts">
                <button class="primary" @click="allow(ask)">Allow</button>
                <button class="deny" @click="deny(ask)">Deny</button>
              </div>
            </template>

            <template v-else>
              <div v-for="(q, qi) in ask.questions" :key="qi" style="margin-bottom:10px">
                <div style="margin-bottom:6px">{{ q.question }}</div>
                <div class="opts">
                  <button v-for="opt in q.options" :key="opt.label"
                          :class="{ primary: picked(ask, q) === opt.label }"
                          @click="pick(ask, q, opt.label)">
                    {{ opt.label }}
                  </button>
                </div>
              </div>
              <div class="opts">
                <button class="primary" @click="submitAnswers(ask)">Submit</button>
              </div>
            </template>
          </div>
        </div>

        <footer>
          <div class="row">
            <textarea v-model="draft" placeholder="Ask Claude to do something…"
                      @keydown.enter.exact.prevent="send"></textarea>
            <button @click="send" :disabled="!connected || !draft.trim() || busy">{{ busy ? '…' : 'Send' }}</button>
          </div>
        </footer>
      </template>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      const { createApp, ref, nextTick, reactive } = Vue;

      createApp({
        setup() {
          const url = ref("ws://localhost:1880/claude");
          const connected = ref(false);
          const phase = ref("login"); // "login" | "chat"
          const me = ref(null);
          const username = ref("");
          const password = ref("");
          const loginError = ref("");

          const messages = reactive([]);
          const asks = reactive([]);
          const draft = ref("");
          const busy = ref(false);
          const logEl = ref(null);
          let ws = null;
          let current = null; // assistant message currently streaming
          const answersByAsk = reactive({}); // requestId -> { question: label }

          function scroll() {
            nextTick(() => {
              if (logEl.value) logEl.value.scrollTop = logEl.value.scrollHeight;
            });
          }

          function connect() {
            if (ws) ws.close();
            ws = new WebSocket(url.value);
            ws.onopen = () => (connected.value = true);
            ws.onclose = () => {
              connected.value = false;
              phase.value = "login";
              me.value = null;
            };
            ws.onmessage = (e) => handle(JSON.parse(e.data));
          }

          function login() {
            loginError.value = "";
            ws.send(JSON.stringify({ type: "login", username: username.value, password: password.value }));
          }
          function logout() {
            connect(); // drop the socket; server forgets this connection's user
          }

          function handle(m) {
            if (m.type === "login-ok") {
              me.value = m.user;
              phase.value = "chat";
              messages.length = 0;
              asks.length = 0;
              password.value = "";
              return;
            }
            if (m.type === "login-fail") { loginError.value = "Invalid username or password"; return; }
            if (m.type === "need-login") { phase.value = "login"; me.value = null; return; }

            if (m.type === "chunk") {
              if (!current) {
                current = reactive({ role: "assistant", text: "", streaming: true });
                messages.push(current);
              }
              current.text += m.text; // live preview; the result replaces it
            } else if (m.type === "result") {
              // The result is the authoritative final answer — replace the
              // streamed preview (which may concatenate multiple turns).
              if (current) {
                current.streaming = false;
                if (m.text) current.text = m.text;
              } else if (m.text) {
                messages.push({ role: "assistant", text: m.text });
              }
              current = null;
              busy.value = false;
            } else if (m.type === "error") {
              if (current) current.streaming = false;
              messages.push({ role: "error", text: m.text || "Run failed" });
              current = null;
              busy.value = false;
            } else if (m.type === "ask") {
              asks.push(m);
            }
            scroll();
          }

          function send() {
            const text = draft.value.trim();
            if (!text || !connected.value || busy.value) return;
            messages.push({ role: "user", text });
            current = null;
            busy.value = true; // one in-flight run per user (avoids overlapping prompts)
            ws.send(JSON.stringify({ type: "prompt", text })); // server tracks the session
            draft.value = "";
            scroll();
          }

          function allow(ask) {
            ws.send(JSON.stringify({ type: "response", requestId: ask.requestId, behavior: "allow" }));
            remove(ask);
          }
          function deny(ask) {
            ws.send(JSON.stringify({ type: "response", requestId: ask.requestId, behavior: "deny", message: "Denied by user" }));
            remove(ask);
          }
          function pick(ask, q, label) {
            answersByAsk[ask.requestId] = answersByAsk[ask.requestId] || {};
            answersByAsk[ask.requestId][q.question] = label;
          }
          function picked(ask, q) { return (answersByAsk[ask.requestId] || {})[q.question]; }
          function submitAnswers(ask) {
            ws.send(JSON.stringify({ type: "response", requestId: ask.requestId, answers: answersByAsk[ask.requestId] || {} }));
            remove(ask);
          }
          function remove(ask) {
            const i = asks.findIndex((a) => a.requestId === ask.requestId);
            if (i >= 0) asks.splice(i, 1);
          }
          function pretty(v) { return JSON.stringify(v, null, 2); }

          connect();
          return { url, connected, phase, me, username, password, loginError,
                   messages, asks, draft, busy, logEl, connect, login, logout, send,
                   allow, deny, pick, picked, submitAnswers, pretty };
        },
      }).mount("#app");
    </script>
  </body>
</html>
